validation:
  batch_size: 32

runs:
- model: "unsloth/Qwen2.5-VL-7B-Instruct-unsloth-bnb-4bit"
  lora_r: 64
  lora_alpha: 128
  lora_dropout: 0.0
  learning_rate: 0.0002
  weight_decay: 0.05
  num_train_epochs: 2
- model: "unsloth/llava-v1.6-mistral-7b-hf-bnb-4bit"
  lora_r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  learning_rate: 0.00002
  weight_decay: 0.05
  num_train_epochs: 2

evaluation:
  batch_size: 32

  tasks:
    zero-shot:
      - model: "unsloth/llava-v1.6-mistral-7b-hf-bnb-4bit"
      - model: "unsloth/Qwen2.5-VL-7B-Instruct-unsloth-bnb-4bit"
  
    base:
      - checkpoint_path: "${out.runs}/coarse/260109-1055/checkpoint-356"
      - checkpoint_path: "${out.runs}/coarse/260109-1131/checkpoint-356"

    transfer:
      - checkpoint_path: "${out.runs}/fine/260109-1054/checkpoint-356"
      - checkpoint_path: "${out.runs}/fine/260109-1132/checkpoint-356"

    joint:
      - checkpoint_path: "${out.runs}/joint/260109-1056/checkpoint-534"
      - checkpoint_path: "${out.runs}/joint/260109-1133/checkpoint-356"
  
wandb:
  project: "beyond_hate_coarse"